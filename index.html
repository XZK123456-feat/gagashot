<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>嘎嘎射击 - Quack Strike</title>
    <link rel="stylesheet" href="styles.css?v=4" />
  </head>
  <body>
    <main class="phone-shell" aria-label="嘎嘎射击手机页面">
      <header class="app-header">
        <div class="brand">
          <img class="brand-logo" src="assets/brand-logo.webp" alt="嘎嘎射击" decoding="async" fetchpriority="high" />
        </div>
        <button class="menu-button" type="button" aria-label="打开菜单">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="nav-tabs" aria-label="页面栏目">
          <button type="button" data-tab="start">开整!</button>
          <button class="active" type="button" data-tab="field">欢乐失控指南</button>
          <button type="button" data-tab="squad">嘎友聚集地</button>
        </nav>
      </header>

      <section class="menu-panel" aria-hidden="true">
        <button type="button">战备档案</button>
        <button type="button">每日挑战</button>
        <button type="button">设置</button>
      </section>

      <div class="rail rail-left"></div>
      <div class="rail rail-right"></div>

      <section class="hero-band" aria-label="开场视频入口">
        <button class="video-teaser" type="button" aria-label="播放嘎嘎射击宣传视频">
          <span class="video-play" aria-hidden="true"></span>
        </button>
      </section>

      <div class="ticker" aria-label="小心嘎了警戒线">
        <div class="ticker-track" aria-hidden="true">
          <img src="assets/warning-strip.webp" alt="" decoding="async" />
          <img src="assets/warning-strip.webp" alt="" decoding="async" />
          <img src="assets/warning-strip.webp" alt="" decoding="async" />
          <img src="assets/warning-strip.webp" alt="" decoding="async" />
        </div>
      </div>

      <section class="card-stack" aria-label="角色和玩法入口">
        <article class="feature-card weapon-card" role="button" tabindex="0" aria-label="打开武器库武器卡片">
          <div class="card-copy">
            <span>失控冒火赛</span>
            <h2>武器库!</h2>
          </div>
          <picture>
            <source srcset="assets/character-gunner.webp" type="image/webp" />
            <img class="character gunner" src="assets/character-gunner.png" alt="持枪鸭子角色" loading="eager" fetchpriority="high" />
          </picture>
          <b class="announce">全平台公测中!</b>
        </article>

        <article class="feature-card hero-card" role="button" tabindex="0" aria-label="打开英雄库角色卡片">
          <div class="card-copy">
            <span>失控艺术家</span>
            <h2>英雄库!</h2>
          </div>
          <picture>
            <source srcset="assets/character-bomber.webp" type="image/webp" />
            <img class="character bomber" src="assets/character-bomber.png" alt="炸弹紫鸟角色" loading="eager" fetchpriority="high" />
          </picture>
          <b class="announce">全平台公测中!</b>
        </article>

        <article class="feature-card mode-card" role="button" tabindex="0" aria-label="打开模式库玩法卡片">
          <div class="card-copy">
            <span>即兴演出算啥</span>
            <h2>模式库!</h2>
          </div>
          <picture>
            <source srcset="assets/character-rocker.webp" type="image/webp" />
            <img class="character rocker" src="assets/character-rocker.png" alt="吉他鸟角色" loading="eager" fetchpriority="high" />
          </picture>
          <b class="announce">全平台公测中!</b>
        </article>

        <article class="hot-card" tabindex="0" aria-label="打开社区热议官方入口">
          <div>
            <h2>社区热议</h2>
            <p>查看鸭友们的翻车整活</p>
          </div>
          <button type="button" aria-label="进入社区热议">→</button>
        </article>
      </section>

      <footer class="bottom-cta">
        <button class="share-button" type="button">分享</button>
        <button class="download-button" type="button">立即下载</button>
      </footer>
    </main>

    <section class="hero-gallery weapon-gallery" aria-hidden="true" aria-label="武器库武器卡片">
      <div class="hero-gallery__panel weapon-gallery__panel" role="dialog" aria-modal="true" aria-label="武器库">
        <button class="hero-gallery__close weapon-gallery__close" type="button" aria-label="关闭武器库">×</button>
        <div class="hero-gallery__stage">
          <button class="hero-gallery__arrow hero-gallery__arrow--prev weapon-gallery__arrow--prev" type="button" aria-label="上一个武器">‹</button>
          <div class="hero-gallery__viewport">
            <div class="hero-gallery__track weapon-gallery__track">
              <figure class="hero-gallery__slide"><img data-src="assets/weapon-gallery/card-0.webp" data-fallback="assets/weapon-gallery/card-0.png" alt="坦克武器卡片" loading="lazy" decoding="async" /></figure>
              <figure class="hero-gallery__slide"><img data-src="assets/weapon-gallery/card-1.webp" data-fallback="assets/weapon-gallery/card-1.png" alt="空袭导弹武器卡片" loading="lazy" decoding="async" /></figure>
              <figure class="hero-gallery__slide"><img data-src="assets/weapon-gallery/card-2.webp" data-fallback="assets/weapon-gallery/card-2.png" alt="直升机武器卡片" loading="lazy" decoding="async" /></figure>
              <figure class="hero-gallery__slide"><img data-src="assets/weapon-gallery/card-3.webp" data-fallback="assets/weapon-gallery/card-3.png" alt="导弹无人机武器卡片" loading="lazy" decoding="async" /></figure>
              <figure class="hero-gallery__slide"><img data-src="assets/weapon-gallery/card-4.webp" data-fallback="assets/weapon-gallery/card-4.png" alt="重型防御机枪武器卡片" loading="lazy" decoding="async" /></figure>
            </div>
          </div>
          <button class="hero-gallery__arrow hero-gallery__arrow--next weapon-gallery__arrow--next" type="button" aria-label="下一个武器">›</button>
        </div>
        <div class="hero-gallery__thumbs weapon-gallery__thumbs" aria-label="武器缩略图">
          <div class="thumb-strip">
            <img src="assets/weapon-gallery/thumb-strip.png" alt="武器缩略图" />
            <button class="active" type="button" data-weapon-index="0" aria-label="查看坦克" style="left:1.48%;width:17.74%;"></button>
            <button type="button" data-weapon-index="1" aria-label="查看空袭导弹" style="left:20.52%;width:19.59%;"></button>
            <button type="button" data-weapon-index="2" aria-label="查看直升机" style="left:41.77%;width:17.56%;"></button>
            <button type="button" data-weapon-index="3" aria-label="查看导弹无人机" style="left:61.18%;width:17.74%;"></button>
            <button type="button" data-weapon-index="4" aria-label="查看重型防御机枪" style="left:80.78%;width:17.74%;"></button>
          </div>
        </div>
      </div>
    </section>

    <section class="hero-gallery" aria-hidden="true" aria-label="英雄库角色卡片">
      <div class="hero-gallery__panel" role="dialog" aria-modal="true" aria-label="英雄库">
        <button class="hero-gallery__close" type="button" aria-label="关闭英雄库">×</button>
        <div class="hero-gallery__stage">
          <button class="hero-gallery__arrow hero-gallery__arrow--prev" type="button" aria-label="上一个角色">‹</button>
          <div class="hero-gallery__viewport">
            <div class="hero-gallery__track">
              <figure class="hero-gallery__slide"><img data-src="assets/hero-gallery/card-0.webp" data-fallback="assets/hero-gallery/card-0.png" alt="嘎嘎鸭角色卡片" loading="lazy" decoding="async" /></figure>
              <figure class="hero-gallery__slide"><img data-src="assets/hero-gallery/card-1.webp" data-fallback="assets/hero-gallery/card-1.png" alt="爆裂鸟角色卡片" loading="lazy" decoding="async" /></figure>
              <figure class="hero-gallery__slide"><img data-src="assets/hero-gallery/card-2.webp" data-fallback="assets/hero-gallery/card-2.png" alt="战斗鸡角色卡片" loading="lazy" decoding="async" /></figure>
              <figure class="hero-gallery__slide"><img data-src="assets/hero-gallery/card-3.webp" data-fallback="assets/hero-gallery/card-3.png" alt="鹦乐鸟角色卡片" loading="lazy" decoding="async" /></figure>
              <figure class="hero-gallery__slide"><img data-src="assets/hero-gallery/card-4.webp" data-fallback="assets/hero-gallery/card-4.png" alt="工程兔角色卡片" loading="lazy" decoding="async" /></figure>
            </div>
          </div>
          <button class="hero-gallery__arrow hero-gallery__arrow--next" type="button" aria-label="下一个角色">›</button>
        </div>
        <div class="hero-gallery__thumbs" aria-label="角色缩略图">
          <div class="thumb-strip">
            <img src="assets/hero-gallery/thumb-strip.png" alt="角色缩略图" />
            <button class="active" type="button" data-hero-index="0" aria-label="查看嘎嘎鸭" style="left:1.46%;width:17.34%;"></button>
            <button type="button" data-hero-index="1" aria-label="查看爆裂鸟" style="left:21.35%;width:17.34%;"></button>
            <button type="button" data-hero-index="2" aria-label="查看战斗鸡" style="left:40.69%;width:17.34%;"></button>
            <button type="button" data-hero-index="3" aria-label="查看鹦乐鸟" style="left:60.04%;width:17.52%;"></button>
            <button type="button" data-hero-index="4" aria-label="查看工程兔" style="left:79.20%;width:19.34%;"></button>
          </div>
        </div>
      </div>
    </section>

    <section class="hero-gallery mode-gallery" aria-hidden="true" aria-label="模式库玩法卡片">
      <div class="hero-gallery__panel mode-gallery__panel" role="dialog" aria-modal="true" aria-label="模式库">
        <button class="hero-gallery__close mode-gallery__close" type="button" aria-label="关闭模式库">×</button>
        <div class="hero-gallery__stage">
          <button class="hero-gallery__arrow hero-gallery__arrow--prev mode-gallery__arrow--prev" type="button" aria-label="上一个模式">‹</button>
          <div class="hero-gallery__viewport">
            <div class="hero-gallery__track mode-gallery__track">
              <figure class="hero-gallery__slide"><img data-src="assets/mode-gallery/card-0.webp" data-fallback="assets/mode-gallery/card-0.png" alt="团队竞技模式卡片" loading="lazy" decoding="async" /></figure>
              <figure class="hero-gallery__slide"><img data-src="assets/mode-gallery/card-1.webp" data-fallback="assets/mode-gallery/card-1.png" alt="平台争霸模式卡片" loading="lazy" decoding="async" /></figure>
              <figure class="hero-gallery__slide"><img data-src="assets/mode-gallery/card-2.webp" data-fallback="assets/mode-gallery/card-2.png" alt="夺金模式卡片" loading="lazy" decoding="async" /></figure>
            </div>
          </div>
          <button class="hero-gallery__arrow hero-gallery__arrow--next mode-gallery__arrow--next" type="button" aria-label="下一个模式">›</button>
        </div>
        <div class="hero-gallery__thumbs mode-gallery__thumbs" aria-label="模式缩略图">
          <div class="thumb-strip">
            <img src="assets/mode-gallery/thumb-strip.png" alt="模式缩略图" />
            <button class="active" type="button" data-mode-index="0" aria-label="查看团队竞技" style="left:2.54%;width:28.57%;"></button>
            <button type="button" data-mode-index="1" aria-label="查看平台争霸" style="left:33.97%;width:28.57%;"></button>
            <button type="button" data-mode-index="2" aria-label="查看夺金模式" style="left:65.40%;width:31.75%;"></button>
          </div>
        </div>
      </div>
    </section>

    <section class="community-page" aria-hidden="true" aria-label="社区热议官方入口">
      <div class="community-page__panel" role="dialog" aria-modal="true" aria-label="社区热议">
        <button class="community-page__close" type="button" aria-label="关闭社区热议">×</button>
        <div class="community-page__art">
          <img class="community-page__base" data-src="assets/community-page.webp" data-fallback="assets/community-page.png" alt="关注我们，获取最新资讯与福利" loading="lazy" decoding="async" />
          <div class="community-warning community-warning--top" aria-hidden="true">
            <div class="community-warning__track">
              <img data-src="assets/warning-strip.webp" alt="" loading="lazy" decoding="async" />
              <img data-src="assets/warning-strip.webp" alt="" loading="lazy" decoding="async" />
            </div>
          </div>
          <div class="community-warning community-warning--bottom" aria-hidden="true">
            <div class="community-warning__track">
              <img data-src="assets/warning-strip.webp" alt="" loading="lazy" decoding="async" />
              <img data-src="assets/warning-strip.webp" alt="" loading="lazy" decoding="async" />
            </div>
          </div>
          <button class="community-link community-link--qq" type="button" aria-label="官方QQ群">
            <img data-src="assets/community/button-qq.webp" data-fallback="assets/community/button-qq.png" alt="" loading="lazy" decoding="async" />
          </button>
          <button class="community-link community-link--wechat" type="button" aria-label="官方公众号">
            <img data-src="assets/community/button-wechat.webp" data-fallback="assets/community/button-wechat.png" alt="" loading="lazy" decoding="async" />
          </button>
          <button class="community-link community-link--douyin" type="button" aria-label="官方抖音">
            <img data-src="assets/community/button-douyin.webp" data-fallback="assets/community/button-douyin.png" alt="" loading="lazy" decoding="async" />
          </button>
          <button class="community-link community-link--kuaishou" type="button" aria-label="官方快手">
            <img data-src="assets/community/button-kuaishou.webp" data-fallback="assets/community/button-kuaishou.png" alt="" loading="lazy" decoding="async" />
          </button>
          <button class="community-link community-link--haoyou" type="button" aria-label="好游快爆">
            <img data-src="assets/community/button-haoyou.webp" data-fallback="assets/community/button-haoyou.png" alt="" loading="lazy" decoding="async" />
          </button>
          <button class="community-link community-link--taptap" type="button" aria-label="TapTap">
            <img data-src="assets/community/button-taptap.webp" data-fallback="assets/community/button-taptap.png" alt="" loading="lazy" decoding="async" />
          </button>
          <img class="community-page__badge" data-src="assets/community/bottom-badge-clean.webp" data-fallback="assets/community/bottom-badge-clean.png" alt="" aria-hidden="true" loading="lazy" decoding="async" />
        </div>
      </div>
    </section>

    <section class="video-modal" aria-hidden="true" aria-label="嘎嘎射击宣传视频">
      <div class="video-modal__panel" role="dialog" aria-modal="true" aria-label="宣传视频播放器">
        <button class="video-modal__close" type="button" aria-label="关闭视频">×</button>
        <div class="video-modal__screen">
          <video class="video-modal__video" controls preload="metadata">
            <source src="assets/trailer.mp4" type="video/mp4" />
          </video>
          <div class="video-modal__placeholder">
            <span class="video-play" aria-hidden="true"></span>
            <b>视频待上传</b>
          </div>
        </div>
      </div>
    </section>

    <script src="app.js?v=4"></script>
  </body>
</html>
